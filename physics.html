<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Booklets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1e293b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-atom text-blue-600 text-2xl mr-3"></i>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Physics</h1>
                </div>
                
                <!-- Search Bar -->
                <div class="hidden sm:block relative max-w-xs w-full">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-search text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition duration-150 ease-in-out" 
                        placeholder="Search booklets..."
                        autocomplete="off">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="mb-8 text-center sm:text-left">
            <h2 class="text-3xl font-bold text-slate-900 mb-2"> Booklets</h2>
            <p class="text-slate-600"> booklets 1-15.</p>
        </div>

        <!-- Mobile Search (Visible only on small screens) -->
        <div class="block sm:hidden mb-6 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-search text-slate-400"></i>
            </div>
            <input type="text" id="mobileSearchInput" 
                class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" 
                placeholder="Search booklet number...">
        </div>

        <!-- Grid Container -->
        <div id="bookletGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Booklets will be injected here by JS -->
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="hidden text-center py-12">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 mb-4">
                <i class="fa-solid fa-folder-open text-slate-400 text-2xl"></i>
            </div>
            <h3 class="text-lg font-medium text-slate-900">No booklets </h3>
            <p class="text-slate-500 mt-1">Try searching for a different number.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="text-center text-sm text-slate-500">
                <p>&copy; Physics.</p>
            </div>
        </div>
    </footer>

    <!-- Split View Modal (Hidden by default) -->
    <div id="splitModal" class="fixed inset-0 z-50 hidden bg-slate-900/95 backdrop-blur-sm transition-opacity duration-300">
        <div class="flex flex-col h-full w-full p-2 sm:p-4">
            <!-- Modal Header -->
            <div class="flex justify-between items-center bg-white rounded-t-lg px-4 py-3 border-b border-slate-200 shadow-sm">
                <div class="flex items-center overflow-hidden">
                    <i class="fa-solid fa-columns text-purple-600 mr-3"></i>
                    <h3 id="splitModalTitle" class="text-lg font-bold text-slate-800 truncate">Booklet Split View</h3>
                </div>
                <button onclick="closeSplitView()" class="ml-2 p-2 hover:bg-red-50 rounded-lg text-slate-500 hover:text-red-500 transition-colors flex items-center gap-2 flex-shrink-0">
                    <span class="hidden sm:inline text-sm font-medium">Close</span>
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <!-- Modal Content (Iframes) -->
            <div class="flex-grow flex flex-col md:flex-row bg-slate-200 h-full overflow-hidden rounded-b-lg border-x border-b border-slate-200">
                <!-- Left Pane: QP -->
                <div class="flex-1 flex flex-col h-full border-b md:border-b-0 md:border-r border-slate-300 relative">
                    <div class="bg-blue-50 px-3 py-2 text-xs font-bold text-blue-700 border-b border-blue-100 flex justify-between items-center shadow-sm">
                        <span class="flex items-center gap-2"><i class="fa-regular fa-file-pdf"></i> Question Paper</span>
                        <a id="qpDownload" href="#" target="_blank" class="hover:text-blue-900 hover:underline">Open in New Tab</a>
                    </div>
                    <iframe id="qpFrame" class="w-full h-full bg-white" src="about:blank"></iframe>
                </div>

                <!-- Right Pane: MS -->
                <div class="flex-1 flex flex-col h-full relative">
                    <div class="bg-green-50 px-3 py-2 text-xs font-bold text-green-700 border-b border-green-100 flex justify-between items-center shadow-sm">
                        <span class="flex items-center gap-2"><i class="fa-solid fa-check-double"></i> Mark Scheme</span>
                        <a id="msDownload" href="#" target="_blank" class="hover:text-green-900 hover:underline">Open in New Tab</a>
                    </div>
                    <iframe id="msFrame" class="w-full h-full bg-white" src="about:blank"></iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const bookletCount = 15;
        // Updated URL components based on new directory structure
        const rootUrl = "https://nithinana.github.io/free/";
        const qpFolder = "physics/"; // Question Papers location
        const msFolder = "physicsms/"; // Mark Schemes location
        
        const grid = document.getElementById('bookletGrid');
        const searchInput = document.getElementById('searchInput');
        const mobileSearchInput = document.getElementById('mobileSearchInput');
        const noResults = document.getElementById('noResults');
        
        // Modal Elements
        const splitModal = document.getElementById('splitModal');
        const qpFrame = document.getElementById('qpFrame');
        const msFrame = document.getElementById('msFrame');
        const splitModalTitle = document.getElementById('splitModalTitle');
        const qpDownload = document.getElementById('qpDownload');
        const msDownload = document.getElementById('msDownload');

        // Helper to create card HTML
        function createBookletCard(number) {
            // Construct URLs using the new folder structure
            const bookletUrl = `${rootUrl}${qpFolder}Booklet%20${number}.pdf`;
            const msUrl = `${rootUrl}${msFolder}Booklet%20${number}%20ms.pdf`;

            return `
                <div class="booklet-card bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-200 card-hover group" data-number="${number}">
                    <!-- Card Header -->
                    <div class="p-5 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 mb-2">
                                    Physics
                                </span>
                                <h3 class="text-lg font-bold text-slate-900 group-hover:text-blue-600 transition-colors">
                                    Booklet ${number}
                                </h3>
                            </div>
                            <div class="h-10 w-10 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600">
                                <i class="fa-regular fa-file-pdf text-xl"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Card Body/Actions -->
                    <div class="p-4 bg-white space-y-3">
                        
                        <!-- Question Paper Button -->
                        <a href="${bookletUrl}" target="_blank" class="flex items-center justify-between w-full p-3 rounded-lg border border-slate-200 hover:border-blue-400 hover:bg-blue-50 transition-all group/btn group">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 group-hover/btn:bg-white group-hover/btn:text-blue-600 transition-colors">
                                    <i class="fa-solid fa-book-open text-sm"></i>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-sm font-semibold text-slate-700">Question Paper</span>
                                    <span class="text-xs text-slate-400">View PDF</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-arrow-up-right-from-square text-xs text-slate-300 group-hover/btn:text-blue-500"></i>
                        </a>

                        <!-- Mark Scheme Button -->
                        <a href="${msUrl}" target="_blank" class="flex items-center justify-between w-full p-3 rounded-lg border border-slate-200 hover:border-green-400 hover:bg-green-50 transition-all group/btn">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 group-hover/btn:bg-white group-hover/btn:text-green-600 transition-colors">
                                    <i class="fa-solid fa-check-double text-sm"></i>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-sm font-semibold text-slate-700">Mark Scheme</span>
                                    <span class="text-xs text-slate-400">View Solutions</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-arrow-up-right-from-square text-xs text-slate-300 group-hover/btn:text-green-500"></i>
                        </a>

                        <!-- Split View Button (New) -->
                        <button onclick="openSplitView(${number})" class="flex items-center justify-between w-full p-3 rounded-lg border border-slate-200 hover:border-purple-400 hover:bg-purple-50 transition-all group/btn">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 group-hover/btn:bg-white group-hover/btn:text-purple-600 transition-colors">
                                    <i class="fa-solid fa-columns text-sm"></i>
                                </div>
                                <div class="flex flex-col text-left">
                                    <span class="text-sm font-semibold text-slate-700">Split View</span>
                                    <span class="text-xs text-slate-400">Side-by-Side</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-expand text-xs text-slate-300 group-hover/btn:text-purple-500"></i>
                        </button>

                    </div>
                </div>
            `;
        }

        // Initialize Grid
        function init() {
            let html = '';
            for (let i = 1; i <= bookletCount; i++) {
                html += createBookletCard(i);
            }
            grid.innerHTML = html;
        }

        // Search Functionality
        function filterGrid(query) {
            const cards = document.querySelectorAll('.booklet-card');
            let hasResults = false;
            const lowerQuery = query.toLowerCase();

            cards.forEach(card => {
                const number = card.getAttribute('data-number');
                const title = `booklet ${number}`;
                
                if (title.includes(lowerQuery) || number.includes(lowerQuery)) {
                    card.style.display = 'block';
                    hasResults = true;
                } else {
                    card.style.display = 'none';
                }
            });

            if (hasResults) {
                noResults.classList.add('hidden');
                grid.classList.remove('hidden');
            } else {
                noResults.classList.remove('hidden');
                grid.classList.add('hidden');
            }
        }

        // Split View Logic
        function openSplitView(number) {
            // Construct URLs using the new folder structure
            const bookletUrl = `${rootUrl}${qpFolder}Booklet%20${number}.pdf`;
            const msUrl = `${rootUrl}${msFolder}Booklet%20${number}%20ms.pdf`;

            // Set Iframes
            qpFrame.src = bookletUrl;
            msFrame.src = msUrl;
            
            // Set Direct Links (Fallbacks)
            qpDownload.href = bookletUrl;
            msDownload.href = msUrl;
            
            // UI Updates
            splitModalTitle.textContent = `Booklet ${number} - Split View`;
            splitModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeSplitView() {
            splitModal.classList.add('hidden');
            qpFrame.src = 'about:blank'; // Clear src to stop loading/playing
            msFrame.src = 'about:blank';
            document.body.style.overflow = ''; // Restore scrolling
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => filterGrid(e.target.value));
        mobileSearchInput.addEventListener('input', (e) => filterGrid(e.target.value));
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeSplitView();
            }
        });

        // Run on load
        init();

    </script>
</body>
</html>
